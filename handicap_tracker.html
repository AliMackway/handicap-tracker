}

async function sheetsRead(tab) {
  return new Promise((resolve) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    window[cbName] = (data) => {
      delete window[cbName];
      document.body.removeChild(script);
      resolve(data && data.ok ? data.data : null);
    };
    script.onerror = () => { delete window[cbName]; resolve(null); };
    script.src = SHEETS_URL + '?action=read&tab=' + encodeURIComponent(tab) + '&callback=' + cbName;
    document.body.appendChild(script);
    setTimeout(() => { if(window[cbName]) { delete window[cbName]; resolve(null); } }, 8000);
  });
}

async function sheetsWrite(tab, rows) {
  return new Promise((resolve) => {
    const cbName = 'wcb_' + Date.now();
    const script = document.createElement('script');
    const data = encodeURIComponent(JSON.stringify({action:'write', tab:tab, rows:rows}));

      if (document.body.contains(script)) document.body.removeChild(script);
      resolve(result);
    };
    script.onerror = () => { delete window[cbName]; resolve(null); };
    script.src = SHEETS_URL + '?callback=' + cbName + '&payload=' + data;
    document.body.appendChild(script);
    setTimeout(() => { if(window[cbName]) { delete window[cbName]; resolve(null); } }, 10000);
  });
}

  rounds.forEach(r => rows.push(headers.map(h => r[h] != null ? r[h] : "")));
  return rows;
}

function rowsToRounds(rows) {

function lookupCourse(db, course, tee) {
  if (!course || !tee) return null;
  return db.find(c =>
    c.course.toLowerCase().trim() === course.toLowerCase().trim() &&
    c.tee.toLowerCase().trim() === tee.toLowerCase().trim()

}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const day = parseInt(parts[2], 10);
  const month = parseInt(parts[1], 10) - 1;
  const year = parts[0];
  const v = day % 100;
  const suf = (v >= 11 && v <= 13) ? 'th' : ['th','st','nd','rd'][day % 10] || 'th';
  return `${day}${suf} ${MONTHS[month]} ${year}`;
}


function App() {

      .map(r => ({ date: r.date, hc: Number(r.newHC) }))
      .sort((a, b) => a.date.localeCompare(b.date));

  useEffect(() => { saveVisited(visited); }, [visited]);

  // Sync to Firebase whenever data or visited changes
  useEffect(() => {
    const sync = async () => {
      setSyncStatus('syncing');
      try {
        const manualEG = (data.englandGolf || []).filter(r => r.id);
        const manualAP = (data.allPlayed || []).filter(r => r.id);
        await Promise.all([
          fbSave('rounds', 'englandGolf', { rounds: manualEG }),
          fbSave('rounds', 'allPlayed', { rounds: manualAP }),
          fbSave('rounds', 'visited', { items: visited })
        ]);
        setSyncStatus('ok');
        setTimeout(() => setSyncStatus('idle'), 3000);
      } catch(e) {
        console.error('Firebase save error:', e);
        setSyncStatus('error');
        notify('Sync error - check connection', 'danger');
      }
    };
    const timer = setTimeout(sync, 2000);
    return () => clearTimeout(timer);
  }, [data, visited]);

  // Load from Firebase on startup
  useEffect(() => {
    const loadFromFirebase = async () => {
      setSyncStatus('syncing');
      try {
        const [egDoc, apDoc, visitedDoc] = await Promise.all([
          fbLoad('rounds', 'englandGolf'),
          fbLoad('rounds', 'allPlayed'),
          fbLoad('rounds', 'visited')
        ]);
        const fresh = JSON.parse(JSON.stringify(RAW_DATA));
        if (egDoc && egDoc.rounds && egDoc.rounds.length) {
          fresh.englandGolf = [...egDoc.rounds, ...fresh.englandGolf];
        }
        if (apDoc && apDoc.rounds && apDoc.rounds.length) {
          fresh.allPlayed = [...apDoc.rounds, ...fresh.allPlayed];
        }
        setData(fresh);
        if (visitedDoc && visitedDoc.items) setVisited(visitedDoc.items);
        setSyncStatus('ok');
        setTimeout(() => setSyncStatus('idle'), 3000);
      } catch(e) {
        console.error('Firebase load error:', e);
        setSyncStatus('error');
      }
    };
    loadFromFirebase();
  }, []);

  useEffect(() => { saveCourseDB(courseDB); }, [courseDB]);

  useEffect(() => { saveData(data); }, [data]);

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3000);
  };

  const allRounds = useMemo(() => {
    const eg = (data.englandGolf || []).map((r, idx) => ({ ...r, method: "englandGolf", _origIdx: idx }));
    const nc = (data.nonCounted || []).map((r, idx) => ({ ...r, method: "nonCounted", _origIdx: idx }));
    const ap = (data.allPlayed || []).map((r, idx) => ({ ...r, method: "allPlayed", _origIdx: idx }));
    const combined = [...eg, ...nc, ...ap];
    combined.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    return combined;
  }, [data]);

  // Compute which England Golf rounds are the 8 counting ones (lowest diff in last 20)
  // Uses original array index to uniquely identify each round
  const countingSet = useMemo(() => {
    const egWithIdx = (data.englandGolf || [])
      .map((r, idx) => ({ ...r, _origIdx: idx }))
      .filter(r => r.scoreDiff != null && r.date);
    // Sort newest first to find last 20
    egWithIdx.sort((a, b) => b.date.localeCompare(a.date));
    const last20 = egWithIdx.slice(0, 20);
    // Sort those 20 by diff ascending, then date descending (newer date wins on equal diff)
    const lowest8 = [...last20]
      .sort((a, b) => {
        const diffDelta = Number(a.scoreDiff) - Number(b.scoreDiff);
        if (diffDelta !== 0) return diffDelta;
        return b.date.localeCompare(a.date);
      })
      .slice(0, 8);
    // Store original array indices so matching is exact
    return new Set(lowest8.map(r => r._origIdx));
  }, [data]);

  // Compute live HC from the 8 counting rounds average
  const liveEgHC = useMemo(() => {
    const egWithIdx = (data.englandGolf || [])
      .map((r, idx) => ({ ...r, _origIdx: idx }))
      .filter(r => r.scoreDiff != null && r.date);
    egWithIdx.sort((a, b) => b.date.localeCompare(a.date));
    const last20 = egWithIdx.slice(0, 20);
    const lowest8 = [...last20]
      .sort((a, b) => {
        const d = Number(a.scoreDiff) - Number(b.scoreDiff);
        return d !== 0 ? d : b.date.localeCompare(a.date);
      })
      .slice(0, 8);
    if (!lowest8.length) return null;
    const avg = lowest8.reduce((s, r) => s + Number(r.scoreDiff), 0) / lowest8.length;
    return { hc: avg, date: lowest8.sort((a,b) => b.date.localeCompare(a.date))[0].date };
  }, [data]);

  // Live All Played HC: lowest 8 from All Played sheet only
  // All Played is the definitive combined record — avoids duplicates from non-counted
  // Single source of truth — used by both stat card and counting panel
  const { liveAllHC, allCounting8Rounds } = useMemo(() => {
    const combined = (data.allPlayed || []).filter(r => r.scoreDiff != null && r.date);
    const lowest8 = [...combined]
      .sort((a, b) => {
        const d = Number(a.scoreDiff) - Number(b.scoreDiff);
        return d !== 0 ? d : b.date.localeCompare(a.date);
      })
      .slice(0, 8)
      .sort((a, b) => b.date.localeCompare(a.date));
    if (!lowest8.length) return { liveAllHC: null, allCounting8Rounds: [] };
    const avg = lowest8.reduce((s, r) => s + Number(r.scoreDiff), 0) / lowest8.length;
    return {
      liveAllHC: { hc: avg, date: lowest8[0].date },
      allCounting8Rounds: lowest8
    };
  }, [data]);

  const filteredRounds = useMemo(() => {
    let rows = allRounds;
    if (filterMethod === "englandGolf") {
      rows = rows.filter(r => r.method === "englandGolf");
    } else {
      // allPlayed: show all rounds but deduplicate (same round may appear in EG + allPlayed)
      const seen = new Set();
      rows = rows.filter(r => {
        const key = (r.date||'') + '|' + String(r.course||'').trim().toLowerCase() + '|' + (r.score||'');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }
    if (filterCourse) rows = rows.filter(r => r.course && r.course.trim().toLowerCase().includes(filterCourse.toLowerCase()));
    if (search) {
      const q = search.toLowerCase();
      rows = rows.filter(r => (r.course || "").toLowerCase().includes(q) || (r.date || "").includes(q) || (r.tee || "").toLowerCase().includes(q));
    }
    rows.sort((a, b) => {
      let av = a[sortField], bv = b[sortField];
      if (typeof av === "string") av = av.toLowerCase();
      if (typeof bv === "string") bv = bv.toLowerCase();
      if (av == null) return 1; if (bv == null) return -1;
      return sortDir === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });

      newData[key] = arr;

function MiniChart({ title, points, yKey, color, bg }) {
  if (!points.length) return null;
  const vals = points.map(p => Number(p[yKey])).filter(v => !isNaN(v));
  if (!vals.length) return null;
  const min = Math.min(...vals) - 0.5, max = Math.max(...vals) + 0.5, range = max - min || 1;
  const W = 340, H = 100, PAD = 8;
  const x = i => PAD + (i / (points.length - 1 || 1)) * (W - PAD * 2);
  const y = v => PAD + (1 - (v - min) / range) * (H - PAD * 2);
  const pts = points.map((p, i) => `${x(i)},${y(Number(p[yKey]))}`).join(" ");
  const polyFill = pts + ` ${x(points.length - 1)},${H - PAD} ${PAD},${H - PAD}`;
  return (
    <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "16px" }}>
      <div style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-secondary)", marginBottom: 8 }}>{title}</div>
      <div style={{ fontSize: 22, fontWeight: 500, color, marginBottom: 8 }}>{fmt(vals[vals.length - 1])}</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: H }}>
        <polygon points={polyFill} fill={bg} opacity="0.7" />
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" />
        <circle cx={x(points.length - 1)} cy={y(vals[vals.length - 1])} r="4" fill={color} />
      </svg>
    </div>
  );
}

function calcShotsToHC(r, courseDB, egHCByDate) {
  if (!courseDB || !r.score || !r.course || !r.tee) return null;
  const match = (courseDB || []).find(c =>
    c.course.toLowerCase().trim() === String(r.course).toLowerCase().trim() &&
    c.tee.toLowerCase().trim() === String(r.tee).toLowerCase().trim()
  );
  if (!match) return null;
  // Use stored newHC for EG rounds, otherwise find nearest EG HC at time of round
  let hcIndex = r.newHC != null ? Number(r.newHC) : null;
  if (!hcIndex && egHCByDate && r.date) {
    // Find the most recent EG HC on or before this round's date
    const entries = egHCByDate.filter(e => e.date <= r.date);
    if (entries.length) hcIndex = entries[entries.length - 1].hc;
  }
  if (!hcIndex) return null;
  const courseHC = Math.round(hcIndex * (match.slope / 113) + (match.rating - match.par));
  return { shots: Number(r.score) - match.par - courseHC, courseHC, par: match.par };
}

function AddEditRound({ round, onSave, onCancel, origIdx, courseDB, setCourseDB, liveEgHC }) {
  const isEdit = !!round;
  const [method, setMethod] = useState(round?.method || "englandGolf");
  const [scoreVal, setScoreVal] = useState(round?.score != null ? String(round.score) : "");
  const scoreRef = useRef(null);
  const [form, setForm] = useState({
    date: round?.date || new Date().toISOString().slice(0, 10),
    course: round?.course || "",
    tee: round?.tee || "",
    scoreDiff: round?.scoreDiff != null ? Number(round.scoreDiff).toFixed(2) : "",
    newHC: round?.newHC != null ? Number(round.newHC).toFixed(1) : "",
    potentialHC: round?.potentialHC != null ? Number(round.potentialHC).toFixed(1) : "",
    toHC: round?.toHC || "",
    id: round?.id || null,
  });
  const [calc, setCalc] = useState({ courseRating: "", slope: "", par: "" });
  const [showCalc, setShowCalc] = useState(false);

  // Auto-fill calc when course+tee match a known entry, and open the panel
  useEffect(() => {
    if (!courseDB) return;
    const match = lookupCourse(courseDB, form.course, form.tee);
    if (match) {
      setCalc({ courseRating: String(match.rating), slope: String(match.slope), par: String(match.par) });
      setShowCalc(true);
    } else {
      setShowCalc(false);
    }
  }, [form.course, form.tee, courseDB]);
  const setC = (k, v) => setCalc(c => ({ ...c, [k]: v }));

  const computeDiff = () => {
    const scoreRaw = scoreRef.current ? scoreRef.current.value : scoreVal;
    const score = Number(scoreRaw);
    const cr = Number(calc.courseRating);
    const slope = Number(calc.slope);
    const par = Number(calc.par);
    if (!score || !cr || !slope || !par) { alert("Enter score, course rating, slope and par to calculate."); return; }
    // WHS Score Differential formula: (113 / Slope) × (Adjusted Gross Score − Course Rating − PCC adjustment)
    // Simplified (no PCC): (Adjusted Gross Score − Course Rating) × (113 / Slope)
    const diff = (score - cr) * (113 / slope);
    const rounded = Math.round(diff * 10) / 10;
    setForm(f => ({ ...f, scoreDiff: rounded.toFixed(2) }));
    setShowCalc(false);
  };

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = () => {
    const scoreFromRef = scoreRef.current ? scoreRef.current.value : scoreVal;
    if (!form.date || !form.course || !scoreFromRef) { alert("Date, course and score are required."); return; }
    if (!form.scoreDiff) { alert("Score differential is required. Use the calculator if needed."); return; }
    const r = { ...form, score: Number(scoreFromRef), scoreDiff: Number(form.scoreDiff) };
    if (method === "englandGolf") r.newHC = form.newHC ? Number(form.newHC) : null;
    if (method === "allPlayed") r.potentialHC = form.potentialHC ? Number(form.potentialHC) : null;
    onSave(r, method, origIdx);
  };

  const Field = ({ label, children }) => (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: "block", fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 4 }}>{label}</label>
      {children}
    </div>
  );

  return (
    <div style={{ maxWidth: 600 }}>
      <h2 style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>{isEdit ? "Edit round" : "Add new round"}</h2>
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "24px" }}>

        <Field label="Type">
          <select value={method} onChange={e => setMethod(e.target.value)} disabled={isEdit} style={{ width: "100%", opacity: isEdit ? 0.6 : 1 }}>
            <option value="englandGolf">England Golf</option>
            <option value="allPlayed">All Rounds Played</option>
          </select>
          {isEdit && <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4 }}>Type cannot be changed when editing</div>}
        </Field>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Date">
            <input type="date" value={form.date} onChange={e => set("date", e.target.value)} style={{ width: "100%", boxSizing: "border-box" }} />
          </Field>
          <Field label="Gross score">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button type="button" onClick={() => setScoreVal(v => String(Math.max(60, Number(v || 90) - 1)))}
                style={{ background: '#185FA5', color: '#fff', border: 'none', borderRadius: 8, width: 44, height: 44, fontSize: 24, cursor: 'pointer', flexShrink: 0 }}>−</button>
              <div style={{ flex: 1, textAlign: 'center', fontSize: 28, fontWeight: 600, color: 'var(--color-text-primary)', padding: '8px 0' }}>
                {scoreVal || '—'}
              </div>
              <button type="button" onClick={() => setScoreVal(v => String(Math.min(150, Number(v || 90) + 1)))}
                style={{ background: '#185FA5', color: '#fff', border: 'none', borderRadius: 8, width: 44, height: 44, fontSize: 24, cursor: 'pointer', flexShrink: 0 }}>+</button>
            </div>
          </Field>
        </div>

        <Field label="Course">
          <select value={form.course} onChange={e => set("course", e.target.value)} style={{ width: "100%", boxSizing: "border-box" }}>
            <option value="">-- Select course --</option>
            {COURSES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </Field>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Tee">
            <select value={form.tee} onChange={e => set("tee", e.target.value)} style={{ width: "100%", boxSizing: "border-box" }}>
              <option value="">-- Select tee --</option>
              {["Black","Blue","Bronze","Gold","Green","Orange","Red","Silver","White","Yellow"].map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </Field>
          <Field label="Score differential">
            <div style={{ display: "flex", gap: 6 }}>
              <input type="number" step="0.01" value={form.scoreDiff} onChange={e => set("scoreDiff", e.target.value)} placeholder="e.g. 24.79" style={{ flex: 1, boxSizing: "border-box" }} />
              <button type="button" onClick={() => setShowCalc(s => !s)} title="Calculate differential" style={{ background: showCalc ? "#185FA5" : "var(--color-background-secondary)", color: showCalc ? "#fff" : "var(--color-text-secondary)", border: "0.5px solid var(--color-border-secondary)", borderRadius: 6, padding: "0 10px", cursor: "pointer", fontSize: 13, whiteSpace: "nowrap" }}>
                <i className="ti ti-calculator" aria-hidden="true"></i>
              </button>
            </div>
          </Field>
        </div>

        {showCalc && (
          <div style={{ background: "#f0f6ff", border: "0.5px solid #b5d4f4", borderRadius: 10, padding: "16px", marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: "#0c447c" }}>Score differential calculator</div>
              {courseDB && lookupCourse(courseDB, form.course, form.tee) && (
                <span style={{ fontSize: 11, background: "#185FA5", color: "#fff", borderRadius: 4, padding: "2px 8px" }}>
                  Auto-filled from course database
                </span>
              )}
            </div>
            <div style={{ fontSize: 12, color: "#378add", marginBottom: 12 }}>
              Formula: (Gross Score − Course Rating) × (113 ÷ Slope)
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
              <div>
                <label style={{ display: "block", fontSize: 12, color: "#378add", marginBottom: 3 }}>Course rating</label>
                <input type="number" step="0.1" value={calc.courseRating} onChange={e => setC("courseRating", e.target.value)} placeholder="e.g. 71.2" style={{ width: "100%", boxSizing: "border-box" }} />
              </div>
              <div>
                <label style={{ display: "block", fontSize: 12, color: "#378add", marginBottom: 3 }}>Slope rating</label>
                <input type="number" value={calc.slope} onChange={e => setC("slope", e.target.value)} placeholder="e.g. 128" style={{ width: "100%", boxSizing: "border-box" }} />
              </div>
              <div>
                <label style={{ display: "block", fontSize: 12, color: "#378add", marginBottom: 3 }}>Par</label>
                <input type="number" value={calc.par} onChange={e => setC("par", e.target.value)} placeholder="e.g. 72" style={{ width: "100%", boxSizing: "border-box" }} />
              </div>
            </div>
            {scoreVal && calc.courseRating && calc.slope && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ fontSize: 13, color: "#0c447c", fontWeight: 500 }}>
                  Differential: {((Number(scoreVal) - Number(calc.courseRating)) * (113 / Number(calc.slope))).toFixed(2)}
                </div>
                <button type="button" onClick={computeDiff} style={{ background: "#185FA5", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontWeight: 500 }}>
                  Apply ↓
                </button>
              </div>
            )}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {courseDB && form.course && form.tee && calc.courseRating && calc.slope && calc.par && !lookupCourse(courseDB, form.course, form.tee) && (
                <button type="button" onClick={() => {
                  const newEntry = { course: form.course.trim(), tee: form.tee.trim(), rating: Number(calc.courseRating), slope: Number(calc.slope), par: Number(calc.par) };
                  setCourseDB(db => [...db, newEntry]);
                  setShowCalc(false);
                  alert(`Saved: ${form.course} (${form.tee}) to course database`);
                }} style={{ background: "#0F6E56", color: "#fff", border: "none", borderRadius: 6, padding: "7px 16px", cursor: "pointer", fontSize: 13, fontWeight: 500 }}>
                  Save to course database
                </button>
              )}
            </div>
          </div>
        )}

        {method === "englandGolf" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="New handicap after round">
                <input type="number" step="0.1" value={form.newHC} onChange={e => set("newHC", e.target.value)}
                  placeholder={liveEgHC ? String(liveEgHC.hc.toFixed(1)) : "e.g. 23.1"}
                  style={{ width: "100%", boxSizing: "border-box" }} />
                {!form.newHC && liveEgHC && (
                  <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 3 }}>
                    Current HC is {liveEgHC.hc.toFixed(1)} — enter new HC after this round
                  </div>
                )}
              </Field>
              <div></div>
            </div>
            <Field label="Shots to HC">
              {(() => {
                const cr = Number(calc.courseRating);
                const slope = Number(calc.slope);
                const par = Number(calc.par);
                const score = Number(scoreVal);
                const hcIndex = form.newHC ? Number(form.newHC) : (liveEgHC ? liveEgHC.hc : 0);
                if (cr && slope && par && score && hcIndex) {
                  const courseHC = Math.round(hcIndex * (slope / 113) + (cr - par));
                  const shotsToHC = score - par - courseHC;
                  return (
                    <div style={{ padding: "12px 14px", background: shotsToHC <= 0 ? "#e1f5ee" : "#faece7", borderRadius: 8, border: "0.5px solid " + (shotsToHC <= 0 ? "#9fe1cb" : "#f5c4b5") }}>
                      <div style={{ fontSize: 22, fontWeight: 600, color: shotsToHC <= 0 ? "#0F6E56" : "#993C1D", marginBottom: 4 }}>
                        {shotsToHC > 0 ? "+" : ""}{shotsToHC} shots
                      </div>
                      <div style={{ fontSize: 12, color: "var(--color-text-secondary)", display: "flex", gap: 12, flexWrap: "wrap" }}>
                        <span>Course HC: <strong>{courseHC}</strong></span>
                        <span>Par: <strong>{par}</strong></span>
                        <span>Score: <strong>{scoreVal}</strong></span>
                        <span>HC Index: <strong>{hcIndex.toFixed(1)}</strong></span>
                      </div>
                    </div>
                  );
                }
                return (
                  <div style={{ padding: "12px 14px", background: "var(--color-background-secondary)", borderRadius: 8, border: "0.5px solid var(--color-border-tertiary)", fontSize: 13, color: "var(--color-text-secondary)" }}>
                    Fill in score and course details — Shots to HC will calculate automatically
                  </div>
                );
              })()}
            </Field>
          </div>
        )}
        {method === "allPlayed" && (
          <Field label="Potential handicap">
            <input type="number" step="0.1" value={form.potentialHC} onChange={e => set("potentialHC", e.target.value)} placeholder="e.g. 20.6" style={{ width: "100%", boxSizing: "border-box" }} />
          </Field>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <button onClick={handleSubmit} style={{ background: "#185FA5", color: "#fff", border: "none", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontWeight: 500, fontSize: 14 }}>
            {isEdit ? "Save changes" : "Add round"}
          </button>
          <button onClick={onCancel} style={{ background: "none", border: "0.5px solid var(--color-border-secondary)", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 14 }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function CoursesPlayedTab({ data, visited, setVisited }) {
  const [sortField, setSortField] = useState('count');
  const [sortDir, setSortDir] = useState('desc');
  const [search, setSearch] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [newVisit, setNewVisit] = useState({ course: '', date: '', notes: '' });

  // Build stats from allPlayed (recorded rounds)
  const recordedStats = useMemo(() => {
    const stats = {};
    (data.allPlayed || []).forEach(r => {
      const course = String(r.course || '').trim();
      if (!course || course === 'nan') return;
      if (!stats[course]) stats[course] = { course, count: 0, diffs: [], dates: [], type: 'recorded' };
      stats[course].count++;
      if (r.scoreDiff != null) stats[course].diffs.push(Number(r.scoreDiff));
      if (r.date) stats[course].dates.push(r.date);
    });
    return stats;
  }, [data]);

  // Merge visited-only courses
  const allCourses = useMemo(() => {
    const result = { ...recordedStats };
    (visited || []).forEach(v => {
      const course = v.course.trim();
      if (!result[course]) {
        result[course] = { course, count: 0, diffs: [], dates: v.date ? [v.date] : [], type: 'visited', notes: v.notes };
      } else {
        if (v.notes) result[course].notes = v.notes;
      }
    });
    return Object.values(result);
  }, [recordedStats, visited]);

  const filtered = useMemo(() => {
    let rows = allCourses;
    if (search) rows = rows.filter(r => r.course.toLowerCase().includes(search.toLowerCase()));
    rows.sort((a, b) => {
      let av, bv;
      if (sortField === 'course') { av = a.course.toLowerCase(); bv = b.course.toLowerCase(); }
      else if (sortField === 'count') { av = a.count; bv = b.count; }
      else if (sortField === 'avgDiff') { av = a.diffs.length ? a.diffs.reduce((s,d)=>s+d,0)/a.diffs.length : 999; bv = b.diffs.length ? b.diffs.reduce((s,d)=>s+d,0)/b.diffs.length : 999; }
      else if (sortField === 'bestDiff') { av = a.diffs.length ? Math.min(...a.diffs) : 999; bv = b.diffs.length ? Math.min(...b.diffs) : 999; }
      else if (sortField === 'lastPlayed') { av = a.dates.length ? Math.max(...a.dates) : ''; bv = b.dates.length ? Math.max(...b.dates) : ''; }
      else { av = a.course.toLowerCase(); bv = b.course.toLowerCase(); }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return rows;
  }, [allCourses, search, sortField, sortDir]);

  const handleSort = (field) => {
    if (sortField === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortField(field); setSortDir(field === 'course' ? 'asc' : 'desc'); }
  };

  const addVisited = () => {
    if (!newVisit.course.trim()) { alert('Course name is required'); return; }
    setVisited(v => [...v, { ...newVisit, id: Date.now().toString() }]);
    setNewVisit({ course: '', date: '', notes: '' });
    setShowAdd(false);
  };

  const removeVisited = (course) => {
    if (!confirm(`Remove "${course}" from visited list?`)) return;
    setVisited(v => v.filter(x => x.course.trim() !== course.trim()));
  };

  const SortIcon = ({ field }) => sortField === field ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
        <h2 style={{ margin: 0, fontSize: 18, fontWeight: 500 }}>Courses Played</h2>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <span style={{ fontSize: 13, color: 'var(--color-text-secondary)' }}>{filtered.length} courses</span>
          <button onClick={() => setShowAdd(s => !s)} style={{ background: '#185FA5', color: '#fff', border: 'none', borderRadius: 7, padding: '7px 14px', cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', gap: 5 }}>
            <i className="ti ti-plus" aria-hidden="true"></i> Add visited course
          </button>
        </div>
      </div>

      {showAdd && (
        <div style={{ background: '#f0f6ff', border: '0.5px solid #b5d4f4', borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: '#0c447c', marginBottom: 12 }}>Add a course you've visited (no score recorded)</div>
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 2fr', gap: 10, marginBottom: 12 }}>
            <div>
              <label style={{ display: 'block', fontSize: 12, color: '#378add', marginBottom: 3 }}>Course name</label>
              <select value={newVisit.course} onChange={e => setNewVisit(v => ({ ...v, course: e.target.value }))} style={{ width: '100%', boxSizing: 'border-box' }}>
                <option value="">-- Select course --</option>
                {COURSES.map(c => <option key={c} value={c}>{c}</option>)}
                <option value="__other__">Other (type below)</option>
              </select>
              {newVisit.course === '__other__' && (
                <input value={newVisit.customCourse || ''} onChange={e => setNewVisit(v => ({ ...v, customCourse: e.target.value }))} placeholder="Type course name" style={{ width: '100%', boxSizing: 'border-box', marginTop: 4 }} />
              )}
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 12, color: '#378add', marginBottom: 3 }}>Date (approx. ok)</label>
              <input type="date" value={newVisit.date} onChange={e => setNewVisit(v => ({ ...v, date: e.target.value }))} style={{ width: '100%', boxSizing: 'border-box' }} />
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 12, color: '#378add', marginBottom: 3 }}>Notes (optional)</label>
              <input value={newVisit.notes} onChange={e => setNewVisit(v => ({ ...v, notes: e.target.value }))} placeholder="e.g. Team event, Captain's Day" style={{ width: '100%', boxSizing: 'border-box' }} />
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={addVisited} style={{ background: '#185FA5', color: '#fff', border: 'none', borderRadius: 6, padding: '6px 14px', cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>Add course</button>
            <button onClick={() => setShowAdd(false)} style={{ background: 'none', border: '0.5px solid var(--color-border-secondary)', borderRadius: 6, padding: '6px 14px', cursor: 'pointer', fontSize: 13 }}>Cancel</button>
          </div>
        </div>
      )}

      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search courses..." style={{ marginBottom: 12, width: '100%', maxWidth: 300, boxSizing: 'border-box' }} />

      <div style={{ background: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 12, overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead style={{ background: 'var(--color-background-secondary)' }}>
              <tr>
                {[['course','Course'],['count','Rounds'],['avgDiff','Avg Diff'],['bestDiff','Best Diff'],['lastPlayed','Last Played']].map(([f,l]) => (
                  <th key={f} onClick={() => handleSort(f)} style={{ padding: '10px 12px', textAlign: f === 'course' ? 'left' : 'right', fontWeight: 500, fontSize: 12, color: 'var(--color-text-secondary)', cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap' }}>
                    {l}<SortIcon field={f} />
                  </th>
                ))}
                <th style={{ padding: '10px 12px', fontWeight: 500, fontSize: 12, color: 'var(--color-text-secondary)' }}>Notes</th>
                <th style={{ padding: '10px 12px' }}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((c, i) => {
                const avgDiff = c.diffs.length ? c.diffs.reduce((s,d)=>s+d,0)/c.diffs.length : null;
                const bestDiff = c.diffs.length ? Math.min(...c.diffs) : null;
                const lastDate = c.dates.length ? c.dates.sort().reverse()[0] : null;
                const isVisitedOnly = c.count === 0;
                return (
                  <tr key={i} style={{ borderTop: '0.5px solid var(--color-border-tertiary)', background: isVisitedOnly ? '#fafaf7' : 'transparent' }}>
                    <td style={{ padding: '8px 12px', fontWeight: 500 }}>
                      {c.course}
                      {isVisitedOnly && <span style={{ marginLeft: 8, fontSize: 11, background: '#f0f0e8', color: '#888', borderRadius: 4, padding: '1px 6px' }}>visited</span>}
                    </td>
                    <td style={{ padding: '8px 12px', textAlign: 'right' }}>{c.count || '—'}</td>
                    <td style={{ padding: '8px 12px', textAlign: 'right' }}>{avgDiff != null ? avgDiff.toFixed(1) : '—'}</td>
                    <td style={{ padding: '8px 12px', textAlign: 'right' }}>{bestDiff != null ? bestDiff.toFixed(1) : '—'}</td>
                    <td style={{ padding: '8px 12px', textAlign: 'right' }}>{lastDate ? fmtDate(lastDate) : '—'}</td>
                    <td style={{ padding: '8px 12px', color: 'var(--color-text-secondary)', fontSize: 12 }}>{c.notes || ''}</td>
                    <td style={{ padding: '8px 12px' }}>
                      {isVisitedOnly && (
                        <button onClick={() => removeVisited(c.course)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#c62828', padding: '2px 6px', fontSize: 12 }}>
                          <i className="ti ti-trash" aria-hidden="true"></i>
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan={7} style={{ padding: 20, textAlign: 'center', color: 'var(--color-text-secondary)' }}>No courses found</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}


function CoursesTab({ courseDB, setCourseDB }) {
  const [search, setSearch] = useState("");
  const [editIdx, setEditIdx] = useState(null);
  const [editEntry, setEditEntry] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newEntry, setNewEntry] = useState({ course: "", tee: "", rating: "", slope: "", par: "" });

  const filtered = courseDB
    .map((c, i) => ({ ...c, _idx: i }))
    .filter(c => !search || c.course.toLowerCase().includes(search.toLowerCase()) || c.tee.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => a.course.localeCompare(b.course) || a.tee.localeCompare(b.tee));

  const saveEdit = () => {
    if (!editEntry.course || !editEntry.tee || !editEntry.rating || !editEntry.slope || !editEntry.par) {
      alert("All fields are required"); return;
    }
    setCourseDB(db => db.map((c, i) => i === editIdx ? { course: editEntry.course, tee: editEntry.tee, rating: Number(editEntry.rating), slope: Number(editEntry.slope), par: Number(editEntry.par) } : c));
    setEditIdx(null); setEditEntry(null);
  };

  const saveNew = () => {
    if (!newEntry.course || !newEntry.tee || !newEntry.rating || !newEntry.slope || !newEntry.par) {
      alert("All fields are required"); return;
    }
    setCourseDB(db => [...db, { course: newEntry.course.trim(), tee: newEntry.tee.trim(), rating: Number(newEntry.rating), slope: Number(newEntry.slope), par: Number(newEntry.par) }]);
    setNewEntry({ course: "", tee: "", rating: "", slope: "", par: "" });
    setShowAdd(false);
  };

  const deleteEntry = (idx) => {
    if (!confirm("Remove this course entry?")) return;
    setCourseDB(db => db.filter((_, i) => i !== idx));
  };

  const resetToBuiltIn = () => {
    if (!confirm("Reset course database to built-in data? Any courses you added will be removed.")) return;
    setCourseDB(JSON.parse(JSON.stringify(BUILT_IN_COURSES)));
  };

  const RowInput = ({ val, onChange, type="text", placeholder="" }) => (
    <input type={type} value={val} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ width: "100%", boxSizing: "border-box", padding: "4px 6px", fontSize: 12 }} />
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <h2 style={{ margin: 0, fontSize: 18, fontWeight: 500 }}>Course database</h2>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => { setShowAdd(s => !s); setEditIdx(null); }} style={{ background: "#185FA5", color: "#fff", border: "none", borderRadius: 7, padding: "7px 14px", cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", gap: 5 }}>
            <i className="ti ti-plus" aria-hidden="true"></i> Add course
          </button>
          <button onClick={resetToBuiltIn} style={{ background: "none", border: "0.5px solid var(--color-border-secondary)", borderRadius: 7, padding: "7px 14px", cursor: "pointer", fontSize: 13, color: "var(--color-text-secondary)" }}>
            Reset to defaults
          </button>
        </div>
      </div>

      <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 12 }}>
        {courseDB.length} entries. When you select a course and tee in Add Round, the rating, slope and par will auto-fill from here.
      </div>

      {showAdd && (
        <div style={{ background: "#f0f6ff", border: "0.5px solid #b5d4f4", borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: "#0c447c", marginBottom: 12 }}>Add new course entry</div>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
            <div><label style={{ fontSize: 11, color: "#378add", display: "block", marginBottom: 2 }}>Course</label><RowInput val={newEntry.course} onChange={v => setNewEntry(e => ({ ...e, course: v }))} placeholder="e.g. Royal Norwich" /></div>
            <div><label style={{ fontSize: 11, color: "#378add", display: "block", marginBottom: 2 }}>Tee</label><RowInput val={newEntry.tee} onChange={v => setNewEntry(e => ({ ...e, tee: v }))} placeholder="e.g. Black" /></div>
            <div><label style={{ fontSize: 11, color: "#378add", display: "block", marginBottom: 2 }}>Course rating</label><RowInput val={newEntry.rating} onChange={v => setNewEntry(e => ({ ...e, rating: v }))} type="number" placeholder="71.2" /></div>
            <div><label style={{ fontSize: 11, color: "#378add", display: "block", marginBottom: 2 }}>Slope</label><RowInput val={newEntry.slope} onChange={v => setNewEntry(e => ({ ...e, slope: v }))} type="number" placeholder="128" /></div>
            <div><label style={{ fontSize: 11, color: "#378add", display: "block", marginBottom: 2 }}>Par</label><RowInput val={newEntry.par} onChange={v => setNewEntry(e => ({ ...e, par: v }))} type="number" placeholder="72" /></div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={saveNew} style={{ background: "#185FA5", color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 500 }}>Save</button>
            <button onClick={() => setShowAdd(false)} style={{ background: "none", border: "0.5px solid var(--color-border-secondary)", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 13 }}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{ marginBottom: 12 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search courses..." style={{ width: "100%", maxWidth: 300, boxSizing: "border-box" }} />
      </div>

      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead style={{ background: "var(--color-background-secondary)" }}>
              <tr>
                {["Course", "Tee", "Rating", "Slope", "Par", ""].map((h, i) => (
                  <th key={i} style={{ padding: "9px 12px", textAlign: i >= 2 && i <= 4 ? "center" : "left", fontWeight: 500, fontSize: 12, color: "var(--color-text-secondary)" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((c, i) => (
                <tr key={i} style={{ borderTop: "0.5px solid var(--color-border-tertiary)", background: editIdx === c._idx ? "#f0f6ff" : "transparent" }}>
                  {editIdx === c._idx ? (
                    <>
                      <td style={{ padding: "6px 8px" }}><RowInput val={editEntry.course} onChange={v => setEditEntry(e => ({ ...e, course: v }))} /></td>
                      <td style={{ padding: "6px 8px" }}><RowInput val={editEntry.tee} onChange={v => setEditEntry(e => ({ ...e, tee: v }))} /></td>
                      <td style={{ padding: "6px 8px", textAlign: "center" }}><RowInput val={editEntry.rating} onChange={v => setEditEntry(e => ({ ...e, rating: v }))} type="number" /></td>
                      <td style={{ padding: "6px 8px", textAlign: "center" }}><RowInput val={editEntry.slope} onChange={v => setEditEntry(e => ({ ...e, slope: v }))} type="number" /></td>
                      <td style={{ padding: "6px 8px", textAlign: "center" }}><RowInput val={editEntry.par} onChange={v => setEditEntry(e => ({ ...e, par: v }))} type="number" /></td>
                      <td style={{ padding: "6px 8px", whiteSpace: "nowrap" }}>
                        <button onClick={saveEdit} style={{ background: "#185FA5", color: "#fff", border: "none", borderRadius: 4, padding: "3px 10px", cursor: "pointer", fontSize: 12, marginRight: 4 }}>Save</button>
                        <button onClick={() => { setEditIdx(null); setEditEntry(null); }} style={{ background: "none", border: "0.5px solid #ccc", borderRadius: 4, padding: "3px 8px", cursor: "pointer", fontSize: 12 }}>Cancel</button>
                      </td>
                    </>
                  ) : (
                    <>
                      <td style={{ padding: "8px 12px", fontWeight: 500 }}>{c.course}</td>
                      <td style={{ padding: "8px 12px" }}><span style={{ background: "#1a1a2e11", borderRadius: 4, padding: "1px 7px", fontSize: 11 }}>{c.tee}</span></td>
                      <td style={{ padding: "8px 12px", textAlign: "center" }}>{c.rating}</td>
                      <td style={{ padding: "8px 12px", textAlign: "center" }}>{c.slope}</td>
                      <td style={{ padding: "8px 12px", textAlign: "center" }}>{c.par}</td>
                      <td style={{ padding: "8px 12px", whiteSpace: "nowrap" }}>
                        <button onClick={() => { setEditIdx(c._idx); setEditEntry({ course: c.course, tee: c.tee, rating: String(c.rating), slope: String(c.slope), par: String(c.par) }); setShowAdd(false); }} style={{ background: "none", border: "0.5px solid #ccc", borderRadius: 4, cursor: "pointer", color: "var(--color-text-secondary)", padding: "3px 8px", fontSize: 12, marginRight: 4 }}>Edit</button>
                        <button onClick={() => deleteEntry(c._idx)} style={{ background: "none", border: "none", cursor: "pointer", color: "#c62828", padding: "3px 6px", fontSize: 12 }}><i className="ti ti-trash" aria-hidden="true"></i></button>
                      </td>
                    </>
                  )}
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr><td colSpan={6} style={{ padding: 16, textAlign: "center", color: "var(--color-text-secondary)", fontSize: 13 }}>No courses found</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}


function CompareTab({ data, liveEgHC, liveAllHC }) {
  const eg = (data.englandGolf || []).filter(r => r.newHC != null && r.date).sort((a, b) => a.date.localeCompare(b.date));

  const egLast = eg[eg.length - 1];
  const egHCValue = liveEgHC ? liveEgHC.hc : (egLast ? Number(egLast.newHC) : null);
  const allHCValue = liveAllHC ? liveAllHC.hc : null;
  const diff = egHCValue != null && allHCValue != null ? egHCValue - allHCValue : null;

  // Compute rolling potential HC at each allPlayed round date (lowest 8 from all played up to that point)
  const apTrend = useMemo(() => {
    const rounds = (data.allPlayed || []).filter(r => r.scoreDiff != null && r.date).sort((a, b) => a.date.localeCompare(b.date));
    const points = [];
    rounds.forEach((r, i) => {
      const upTo = rounds.slice(0, i + 1);
      const lowest8 = [...upTo].sort((a, b) => {
        const d = Number(a.scoreDiff) - Number(b.scoreDiff);
        return d !== 0 ? d : b.date.localeCompare(a.date);
      }).slice(0, 8);
      if (lowest8.length === 8) {
        const avg = lowest8.reduce((s, x) => s + Number(x.scoreDiff), 0) / 8;
        points.push({ date: r.date, hc: avg });
      }
    });
    return points;
  }, [data]);

  const egPoints = eg.slice(-30);
  const apPoints = apTrend.slice(-30);
  const allPts = [...egPoints.map(p => Number(p.newHC)), ...apPoints.map(p => p.hc)].filter(v => !isNaN(v));
  const minV = Math.min(...allPts) - 1, maxV = Math.max(...allPts) + 1, range = maxV - minV || 1;
  const W = 600, H = 200, PAD = 16;
  const allDates = [...new Set([...egPoints.map(p => p.date), ...apPoints.map(p => p.date)])].sort();
  const xIdx = d => allDates.indexOf(d);
  const xScale = i => PAD + (i / (allDates.length - 1 || 1)) * (W - PAD * 2);
  const yScale = v => PAD + (1 - (v - minV) / range) * (H - PAD * 2);

  const egPath = egPoints.map(p => `${xScale(xIdx(p.date))},${yScale(Number(p.newHC))}`).join(" ");
  const apPath = apPoints.map(p => `${xScale(xIdx(p.date))},${yScale(p.hc)}`).join(" ");

  const courseSummary = {};
  [...(data.englandGolf || []), ...(data.nonCounted || []), ...(data.allPlayed || [])].forEach(r => {
    if (!r.course) return;
    const k = r.course.trim();
    if (!courseSummary[k]) courseSummary[k] = { count: 0, diffs: [] };
    courseSummary[k].count++;
    if (r.scoreDiff != null) courseSummary[k].diffs.push(Number(r.scoreDiff));
  });
  const courseRows = Object.entries(courseSummary).map(([c, d]) => ({ course: c, count: d.count, avg: d.diffs.length ? d.diffs.reduce((a, b) => a + b) / d.diffs.length : null })).sort((a, b) => b.count - a.count);

  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 500, marginBottom: 20 }}>HC Types</h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 24 }}>
        <StatCard label="England Golf current HC" value={liveEgHC ? fmt(liveEgHC.hc) : (egLast ? fmt(egLast.newHC) : "—")} color="#185FA5" sub={liveEgHC ? liveEgHC.date + " (calculated)" : egLast?.date} />
        <StatCard label="Potential HC (all played)" value={liveAllHC ? fmt(liveAllHC.hc) : "—"} color="#0F6E56" sub={liveAllHC ? liveAllHC.date + " (calculated)" : ""} />
        <StatCard label="Difference" value={diff != null ? (diff > 0 ? "+" : "") + fmt(diff) : "—"} color={diff != null && diff > 0 ? "#993C1D" : "#0F6E56"} sub="EG minus potential" />
      </div>
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 24 }}>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>Handicap trend — last 30 rounds per method</div>
        <div style={{ display: "flex", gap: 16, marginBottom: 10, fontSize: 12 }}>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 24, height: 2, background: "#185FA5", display: "inline-block" }}></span> England Golf</span>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 24, height: 2, background: "#0F6E56", display: "inline-block", borderTop: "2px dashed #0F6E56" }}></span> All Played</span>
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: H }} role="img" aria-label="Handicap trend comparison chart">
          {egPoints.length > 1 && <polyline points={egPath} fill="none" stroke="#185FA5" strokeWidth="2" strokeLinejoin="round" />}
          {apPoints.length > 1 && <polyline points={apPath} fill="none" stroke="#0F6E56" strokeWidth="2" strokeLinejoin="round" strokeDasharray="6 3" />}
          {egPoints.map((p, i) => <circle key={i} cx={xScale(xIdx(p.date))} cy={yScale(Number(p.newHC))} r="3" fill="#185FA5" />)}
          {apPoints.map((p, i) => <circle key={i} cx={xScale(xIdx(p.date))} cy={yScale(p.hc)} r="3" fill="#0F6E56" />)}
        </svg>
      </div>
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 12 }}>All courses played (by rounds)</div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ color: "var(--color-text-secondary)", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
              <th style={{ textAlign: "left", padding: "4px 8px", fontWeight: 400 }}>Course</th>
              <th style={{ textAlign: "right", padding: "4px 8px", fontWeight: 400 }}>Rounds</th>
              <th style={{ textAlign: "right", padding: "4px 8px", fontWeight: 400 }}>Avg diff</th>
              <th style={{ textAlign: "left", padding: "4px 8px", fontWeight: 400 }}>Frequency</th>
            </tr>
          </thead>
          <tbody>
            {courseRows.map((r, i) => (
              <tr key={i} style={{ borderTop: "0.5px solid var(--color-border-tertiary)" }}>
                <td style={{ padding: "6px 8px", fontWeight: 500 }}>{r.course}</td>
                <td style={{ padding: "6px 8px", textAlign: "right" }}>{r.count}</td>
                <td style={{ padding: "6px 8px", textAlign: "right" }}>{r.avg != null ? fmt(r.avg, 1) : "—"}</td>
                <td style={{ padding: "6px 8px" }}>
                  <div style={{ background: "#E6F1FB", borderRadius: 4, height: 8, width: "100%", overflow: "hidden" }}>
                    <div style={{ background: "#185FA5", height: "100%", width: `${(r.count / courseRows[0].count) * 100}%`, borderRadius: 4 }}></div>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
